<title>Nutrir — Calculadora Energética</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8CC7A;
  --gold-pale: #F5EDD4;
  --dark: #1A1A1A;
  --dark2: #2C2C2C;
  --mid: #4A4A4A;
  --light: #F8F5F0;
  --white: #FFFFFF;
  --green: #4CAF7A;
  --green-bg: #E8F5EE;
  --red: #E05252;
  --red-bg: #FBE8E8;
  --blue: #4A7FC1;
  --blue-bg: #E8EFF8;
  --border: #E0D8CC;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--light); color: var(--dark); min-height: 100vh; }

/* NAV */
.nav { background: var(--dark); padding: 0 32px; display: flex; align-items: center; gap: 0; height: 64px; position: sticky; top: 0; z-index: 100; }
.nav-logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--gold); letter-spacing: 2px; margin-right: 40px; white-space: nowrap; }
.nav-tabs { display: flex; gap: 2px; flex: 1; overflow-x: auto; }
.nav-tab { padding: 8px 18px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 13px; font-weight: 500; color: #888; transition: all .2s; white-space: nowrap; background: none; border: none; font-family: 'DM Sans', sans-serif; }
.nav-tab:hover { color: var(--gold-light); }
.nav-tab.active { background: var(--light); color: var(--dark); }
.nav-tab.done { color: var(--gold-light); }

/* LAYOUT */
.page { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
.page-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--dark); margin-bottom: 6px; }
.page-sub { font-size: 14px; color: var(--mid); margin-bottom: 28px; }

/* CARDS */
.card { background: var(--white); border-radius: 16px; padding: 24px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 20px; }
.card-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 16px; }

/* GRID */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

/* INPUTS */
.field { margin-bottom: 16px; }
.label { font-size: 12px; font-weight: 500; color: var(--mid); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: .5px; }
input, select, textarea { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--dark); background: var(--white); transition: border .2s; outline: none; }
input:focus, select:focus { border-color: var(--gold); }
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

/* BUTTONS */
.btn { padding: 11px 22px; border-radius: 10px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; transition: all .2s; }
.btn-gold { background: var(--gold); color: white; }
.btn-gold:hover { background: var(--gold-light); }
.btn-outline { background: none; border: 1.5px solid var(--border); color: var(--mid); }
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }
.btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 7px; }
.btn-danger { background: var(--red-bg); color: var(--red); border: none; }
.btn-danger:hover { background: var(--red); color: white; }
.btn-green { background: var(--green); color: white; }
.btn-green:hover { opacity:.85; }

/* STAT CARDS */
.stat { text-align: center; padding: 20px 16px; border-radius: 14px; }
.stat.gold { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: white; }
.stat.green { background: var(--green-bg); }
.stat.blue { background: var(--blue-bg); }
.stat.red { background: var(--red-bg); }
.stat-val { font-family: 'DM Serif Display', serif; font-size: 30px; color: inherit; }
.stat.green .stat-val { color: var(--green); }
.stat.blue .stat-val { color: var(--blue); }
.stat.red .stat-val { color: var(--red); }
.stat-lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; margin-top: 4px; opacity: .8; }

/* TABLE */
.tbl { width: 100%; border-collapse: collapse; }
.tbl th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: var(--mid); padding: 10px 12px; border-bottom: 2px solid var(--border); }
.tbl td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border); }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--light); }

/* MACRO BAR */
.macro-bar-wrap { margin: 12px 0; }
.macro-bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
.macro-bar { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
.macro-bar-fill { height: 100%; border-radius: 99px; transition: width .5s; }
.fill-gold { background: var(--gold); }
.fill-green { background: var(--green); }
.fill-blue { background: var(--blue); }
.fill-red { background: var(--red); }

/* SEARCH */
.search-wrap { position: relative; }
.search-wrap input { padding-left: 38px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #bbb; font-size: 16px; pointer-events: none; }
.dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1.5px solid var(--border); border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); z-index: 200; max-height: 260px; overflow-y: auto; margin-top: 4px; }
.dropdown-item { padding: 10px 16px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.dropdown-item:hover { background: var(--gold-pale); }
.dropdown-item:last-child { border-bottom: none; }
.dropdown-item .food-name { flex: 1; }
.dropdown-item .food-meta { font-size: 11px; color: var(--mid); text-align: right; margin-left: 12px; }

/* MEAL SECTIONS */
.meal-section { border-left: 3px solid var(--gold); padding-left: 16px; margin-bottom: 24px; }
.meal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.meal-name { font-weight: 600; font-size: 15px; }
.meal-stats { font-size: 12px; color: var(--mid); }

/* PROGRESS RINGS */
.ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.ring-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: var(--mid); }

/* BADGE */
.badge { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.badge-gold { background: var(--gold-pale); color: var(--gold); }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-red { background: var(--red-bg); color: var(--red); }

/* ACTIVITY ROW */
.act-row { display: grid; grid-template-columns: 1fr auto auto auto auto; gap: 12px; align-items: center; padding: 12px; background: var(--light); border-radius: 10px; margin-bottom: 8px; }
.act-row input, .act-row select { margin: 0; }

/* SCROLLABLE */
.scroll-y { max-height: 300px; overflow-y: auto; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .grid2, .grid3, .grid4 { grid-template-columns: 1fr; }
  .act-row { grid-template-columns: 1fr 1fr; }
  .nav { padding: 0 12px; }
  .page { padding: 20px 14px; }
}

/* DIVIDER */
.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* RESULT HIGHLIGHT */
.result-box { background: linear-gradient(135deg, var(--dark), var(--dark2)); color: white; border-radius: 16px; padding: 24px; }
.result-box .label { color: #aaa; }

/* TAG */
.tag { display: inline-flex; align-items: center; gap: 6px; background: var(--light); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 12px; }

/* EMPTY STATE */
.empty { text-align: center; padding: 40px; color: var(--mid); font-size: 14px; }

/* SECTION HDR */
.sec-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

/* STATUS BAR */
.status-bar { display: flex; gap: 8px; padding: 12px 16px; background: var(--gold-pale); border-radius: 12px; align-items: center; font-size: 13px; margin-bottom: 20px; }

.flex { display: flex; }
.gap8 { gap: 8px; }
.gap12 { gap: 12px; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.mt8 { margin-top: 8px; }
.mt16 { margin-top: 16px; }
.mb8 { margin-bottom: 8px; }
.mb16 { margin-bottom: 16px; }
.text-sm { font-size: 13px; }
.text-xs { font-size: 11px; }
.text-mid { color: var(--mid); }
.text-gold { color: var(--gold); }
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.font-bold { font-weight: 600; }
.w100 { width: 100%; }
.flex1 { flex: 1; }
</style>

// ── CALCULATIONS ──────────────────────────────────────────────────────────────
function calcTMB(dados) {
  const { peso, altura, idade, gordura, sexo } = dados;
  const mlg = peso * (1 - gordura/100);
  const cunningham = 500 + 22 * mlg;
  const hbM = 66.5 + 13.75*peso + 5.003*altura - 6.755*idade;
  const hbF = 655.1 + 9.563*peso + 1.85*altura - 4.676*idade;
  const hbUsed = sexo === 'M' ? hbM : hbF;
  return { mlg, cunningham, hbM, hbF, hbUsed };
}

function calcGEAD(peso, dailyHours) {
  return dailyHours.reduce((acc, a) => acc + a.met * peso * a.horas, 0);
}

function calcGEAF(peso, trainActivities) {
  return trainActivities.map(a => {
    const getAF = a.met * peso * (a.durMin / 60);
    const mediaGeaf = (getAF * a.freqSem) / 7;
    return { ...a, getAF, mediaGeaf };
  });
}

function calcGET(dados, dailyHours, trainActivities) {
  const { cunningham } = calcTMB(dados);
  const tmb = cunningham;
  const gead = calcGEAD(dados.peso, dailyHours);
  const trainCalc = calcGEAF(dados.peso, trainActivities);
  const mediaGeaf = trainCalc.reduce((s, a) => s + a.mediaGeaf, 0);
  const get = tmb + gead/24 + mediaGeaf;
  // Actually use the same formula as spreadsheet: TMB_FA (GEAD based) + media GEAF
  // From spreadsheet: TMB+FA = weight-based from GEAD / 24h * 24 + GEAF_media
  // Simplification: GET = cunningham + gead/24h_norm + geafMedia ... 
  // Looking at spreadsheet more carefully:
  // TMB+FA = separate row (2207.8 in example = cunningham value???)
  // GET = 2599 = TMB+FA(2207.8) + MÉDIA GEAF(391.3) = 2599.1 ✓
  // TMB+FA = from GEAD activities: gead = 2207.8 (sum of daily acts)
  // So: GET = GEAD + GEAF_média
  const getTotal = gead + mediaGeaf;
  return { tmb, gead, mediaGeaf, trainCalc, getTotal };
}

function calcMacros(kcalDieta, peso, ptnGKg, cho_pct, ptn_pct, lip_pct) {
  // From spreadsheet: PTN = ptn_g/kg * mlg... actually uses manual entry
  // Let's use standard: ptn in g/kg of body weight
  const ptn_g = ptnGKg * peso;
  const ptn_kcal = ptn_g * 4;
  const cho_kcal = kcalDieta * (cho_pct/100);
  const cho_g = cho_kcal / 4;
  const lip_kcal = kcalDieta - ptn_kcal - cho_kcal;
  const lip_g = lip_kcal / 9;
  return { cho_g, ptn_g, lip_g, cho_kcal, ptn_kcal, lip_kcal,
    cho_pct: (cho_kcal/kcalDieta)*100, ptn_pct: (ptn_kcal/kcalDieta)*100, lip_pct: (lip_kcal/kcalDieta)*100 };
}

function MacroBar({ label, value, max, color, unit='g' }) {
  const pct = max > 0 ? Math.min(100, (value/max)*100) : 0;
  const over = value > max;
  return (
    <div className="macro-bar-wrap">
      <div className="macro-bar-label">
        <span style={{fontWeight:600}}>{label}</span>
        <span style={{color: over?'var(--red)':'var(--mid)'}}>
          {value.toFixed(1)}{unit} / {max.toFixed(1)}{unit}
        </span>
      </div>
      <div className="macro-bar">
        <div className={`macro-bar-fill fill-${color}`} style={{width:`${pct}%`, background: over?'var(--red)':undefined}}/>
      </div>
    </div>
  );
}

function FoodSearch({ onAdd }) {
  const [q, setQ] = useState('');
  const [qty, setQty] = useState('100');
  const [open, setOpen] = useState(false);
  const ref = useRef();

  const results = useMemo(() => {
    if (q.length < 2) return [];
    const lower = q.toLowerCase();
    return FOODS.filter(f => f.nome.toLowerCase().includes(lower)).slice(0, 30);
  }, [q]);

  useEffect(() => {
    function click(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', click);
    return () => document.removeEventListener('mousedown', click);
  }, []);

  function select(food) {
    const g = parseFloat(qty) || 100;
    const factor = g / 100;
    onAdd({
      nome: food.nome,
      quantidade: g,
      kcal_unit: food.kcal,
      carbo_unit: food.carbo,
      ptn_unit: food.ptn,
      lip_unit: food.lip,
      kcal: food.kcal * factor,
      carbo: food.carbo * factor,
      ptn: food.ptn * factor,
      lip: food.lip * factor,
    });
    setQ(''); setOpen(false);
  }

  return (
    <div ref={ref} style={{display:'flex',gap:10,alignItems:'flex-start'}}>
      <div className="search-wrap flex1">
        <span className="search-icon">🔍</span>
        <input
          placeholder="Buscar alimento..."
          value={q}
          onChange={e => { setQ(e.target.value); setOpen(true); }}
          onFocus={() => setOpen(true)}
        />
        {open && results.length > 0 && (
          <div className="dropdown">
            {results.map((f,i) => (
              <div key={i} className="dropdown-item" onClick={() => select(f)}>
                <span className="food-name">{f.nome}</span>
                <span className="food-meta">{f.kcal} kcal · C:{f.carbo}g P:{f.ptn}g G:{f.lip}g</span>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{width:90}}>
        <input type="number" value={qty} onChange={e=>setQty(e.target.value)} placeholder="g" min="1" style={{textAlign:'center'}}/>
      </div>
    </div>
  );
}

function Tab4({ kcalDieta, dados, ptnGKg, choPct, meals, setMeals }) {
  const ptn_g = ptnGKg * dados.peso;
  const ptn_pct_calc = kcalDieta > 0 ? (ptn_g*4/kcalDieta)*100 : 0;
  const lip_pct = Math.max(0, 100 - choPct - ptn_pct_calc);
  const cho_g = kcalDieta > 0 ? (kcalDieta * choPct/100)/4 : 0;
  const lip_g = kcalDieta > 0 ? (kcalDieta * lip_pct/100)/9 : 0;

  const totals = useMemo(() => {
    let kcal=0,cho=0,ptn=0,lip=0;
    Object.values(meals).forEach(items => items.forEach(f => { kcal+=f.kcal; cho+=f.carbo; ptn+=f.ptn; lip+=f.lip; }));
    return {kcal,cho,ptn,lip};
  }, [meals]);

  function addToMeal(meal, food) {
    setMeals(m => ({...m, [meal]: [...(m[meal]||[]), food]}));
  }
  function removeFromMeal(meal, idx) {
    setMeals(m => ({...m, [meal]: m[meal].filter((_,i)=>i!==idx)}));
  }
  function updateQty(meal, idx, newQty) {
    setMeals(m => ({...m, [meal]: m[meal].map((f,i) => {
      if(i!==idx) return f;
      const g = parseFloat(newQty)||0;
      const factor = g/100;
      return {...f, quantidade:g, kcal:f.kcal_unit*factor, carbo:f.carbo_unit*factor, ptn:f.ptn_unit*factor, lip:f.lip_unit*factor};
    })}));
  }
  function clearMeal(meal) { setMeals(m => ({...m, [meal]:[]})); }
  function clearAll() { const empty={}; MEALS.forEach(m=>empty[m]=[]); setMeals(empty); }

  const mealTotals = useCallback((meal) => {
    const items = meals[meal]||[];
    return items.reduce((a,f)=>({kcal:a.kcal+f.kcal,cho:a.cho+f.carbo,ptn:a.ptn+f.ptn,lip:a.lip+f.lip}),{kcal:0,cho:0,ptn:0,lip:0});
  }, [meals]);

  return (
    <div className="page">
      <div className="page-title">Montagem da Dieta</div>
      <div className="page-sub">Adicione alimentos em cada refeição e acompanhe o progresso dos macros</div>

      {/* Summary bar */}
      {kcalDieta > 0 && (
        <div className="card" style={{marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div className="card-title" style={{margin:0}}>📊 Progresso Total do Dia</div>
            <button className="btn btn-sm btn-danger" onClick={clearAll}>Limpar tudo</button>
          </div>
          <div className="grid4" style={{marginBottom:16}}>
            <div className="stat gold"><div className="stat-val">{totals.kcal.toFixed(0)}</div><div className="stat-lbl">kcal consumidas</div></div>
            <div className="stat blue"><div className="stat-val">{totals.cho.toFixed(1)}g</div><div className="stat-lbl">Carboidrato</div></div>
            <div className="stat green"><div className="stat-val">{totals.ptn.toFixed(1)}g</div><div className="stat-lbl">Proteína</div></div>
            <div className="stat" style={{background:'#FFF3E0'}}><div className="stat-val" style={{color:'#E07A20'}}>{totals.lip.toFixed(1)}g</div><div className="stat-lbl">Lipídeo</div></div>
          </div>
          <MacroBar label="Calorias" value={totals.kcal} max={kcalDieta} color="gold" unit=" kcal"/>
          <MacroBar label="CHO" value={totals.cho} max={cho_g} color="blue"/>
          <MacroBar label="PTN" value={totals.ptn} max={ptn_g} color="green"/>
          <MacroBar label="LIP" value={totals.lip} max={lip_g} color="red"/>
          <div style={{marginTop:10,fontSize:12,color:'var(--mid)'}}>
            Meta: <b>{kcalDieta} kcal</b> · CHO: <b>{cho_g.toFixed(0)}g</b> · PTN: <b>{ptn_g.toFixed(0)}g</b> · LIP: <b>{lip_g.toFixed(0)}g</b>
          </div>
        </div>
      )}

      {MEALS.map(meal => {
        const mt = mealTotals(meal);
        const items = meals[meal]||[];
        return (
          <div key={meal} className="card">
            <div className="meal-header">
              <div>
                <div className="meal-name">{meal}</div>
                {items.length > 0 && (
                  <div className="meal-stats">{mt.kcal.toFixed(0)} kcal · CHO: {mt.cho.toFixed(1)}g · PTN: {mt.ptn.toFixed(1)}g · LIP: {mt.lip.toFixed(1)}g</div>
                )}
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                {items.length > 0 && <button className="btn btn-sm btn-danger" onClick={()=>clearMeal(meal)}>Limpar</button>}
              </div>
            </div>

            <FoodSearch onAdd={(f) => addToMeal(meal, f)} />

            {items.length > 0 && (
              <table className="tbl" style={{marginTop:12}}>
                <thead>
                  <tr>
                    <th>Alimento</th>
                    <th style={{width:100}}>Qtd (g)</th>
                    <th>kcal</th><th>CHO</th><th>PTN</th><th>LIP</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {items.map((f,i) => (
                    <tr key={i}>
                      <td style={{fontWeight:500}}>{f.nome}</td>
                      <td>
                        <input type="number" value={f.quantidade} onChange={e=>updateQty(meal,i,e.target.value)}
                          style={{width:80,textAlign:'center',padding:'5px 8px',fontSize:13}} min="1"/>
                      </td>
                      <td>{f.kcal.toFixed(1)}</td>
                      <td>{f.carbo.toFixed(1)}g</td>
                      <td>{f.ptn.toFixed(1)}g</td>
                      <td>{f.lip.toFixed(1)}g</td>
                      <td><button className="btn btn-sm btn-danger" onClick={()=>removeFromMeal(meal,i)}>✕</button></td>
                    </tr>
                  ))}
                  {items.length > 1 && (
                    <tr style={{background:'var(--light)',fontWeight:700}}>
                      <td colSpan={2}>Subtotal</td>
                      <td>{mt.kcal.toFixed(1)}</td>
                      <td>{mt.cho.toFixed(1)}g</td>
                      <td>{mt.ptn.toFixed(1)}g</td>
                      <td>{mt.lip.toFixed(1)}g</td>
                      <td></td>
                    </tr>
                  )}
                </tbody>
              </table>
            )}
            {items.length === 0 && <div className="text-sm text-mid mt8">Busque um alimento acima e informe a quantidade em gramas</div>}
          </div>
        );
      })}
    </div>
  );
}

  const totals = useMemo(() => {
    let kcal=0,cho=0,ptn=0,lip=0;
    Object.values(meals).forEach(items => items.forEach(f => { kcal+=f.kcal; cho+=f.carbo; ptn+=f.ptn; lip+=f.lip; }));
    return {kcal,cho,ptn,lip};
  }, [meals]);

  const get = res?.getTotal || 0;

  const mealTotals = (meal) => {
    const items = meals[meal]||[];
    return items.reduce((a,f)=>({kcal:a.kcal+f.kcal,cho:a.cho+f.carbo,ptn:a.ptn+f.ptn,lip:a.lip+f.lip}),{kcal:0,cho:0,ptn:0,lip:0});
  };

  function print() { window.print(); }

  return (
    <div className="page">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
        <div className="page-title">Relatório Completo</div>
        <button className="btn btn-gold" onClick={print}>🖨️ Imprimir / PDF</button>
      </div>
      <div className="page-sub">Resumo completo do cálculo energético e plano alimentar</div>

      {dados.nome && <div style={{fontSize:20,fontFamily:'DM Serif Display',marginBottom:24}}>Paciente: <span style={{color:'var(--gold)'}}>{dados.nome}</span></div>}

      <div className="card result-box" style={{marginBottom:20}}>
        <div className="card-title" style={{color:'var(--gold-light)'}}>⚡ Gasto Energético</div>
        <div className="grid4">
          {[
            {label:'Peso',val:`${dados.peso}kg`},{label:'Altura',val:`${dados.altura}cm`},
            {label:'% Gordura',val:`${dados.gordura}%`},{label:'Massa Magra',val:`${(dados.peso*(1-dados.gordura/100)).toFixed(1)}kg`},
          ].map((x,i)=>(
            <div key={i} style={{textAlign:'center',background:'rgba(255,255,255,0.06)',padding:16,borderRadius:12}}>
              <div style={{fontSize:22,fontWeight:700,color:'white'}}>{x.val}</div>
              <div style={{fontSize:11,color:'#aaa',textTransform:'uppercase'}}>{x.label}</div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:20,marginTop:16,flexWrap:'wrap'}}>
          {res && [
            {label:'TMB (Cunningham)',val:`${res.tmb.toFixed(0)} kcal`},
            {label:'GEAD',val:`${res.gead.toFixed(0)} kcal`},
            {label:'Média GEAF',val:`${res.mediaGeaf.toFixed(0)} kcal`},
            {label:'GET Total',val:`${get.toFixed(0)} kcal`},
          ].map((x,i)=>(
            <div key={i} style={{flex:1,minWidth:120,textAlign:'center',background:'rgba(255,255,255,0.06)',padding:16,borderRadius:12}}>
              <div style={{fontSize:22,fontWeight:700,color:'var(--gold-light)'}}>{x.val}</div>
              <div style={{fontSize:11,color:'#aaa',textTransform:'uppercase'}}>{x.label}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="card-title">🎯 Metas da Dieta</div>
        <div className="grid4">
          <div className="stat gold"><div className="stat-val">{kcalDieta}</div><div className="stat-lbl">Meta kcal</div></div>
          <div className="stat blue"><div className="stat-val">{cho_g.toFixed(0)}g</div><div className="stat-lbl">CHO meta</div></div>
          <div className="stat green"><div className="stat-val">{ptn_g.toFixed(0)}g</div><div className="stat-lbl">PTN meta</div></div>
          <div className="stat" style={{background:'#FFF3E0'}}><div className="stat-val" style={{color:'#E07A20'}}>{lip_g.toFixed(0)}g</div><div className="stat-lbl">LIP meta</div></div>
        </div>
        {get > 0 && kcalDieta > 0 && (
          <div style={{marginTop:16,padding:'12px 16px',borderRadius:10,background:kcalDieta<get?'var(--green-bg)':'var(--red-bg)'}}>
            <span style={{fontWeight:600,color:kcalDieta<get?'var(--green)':'var(--red)'}}>
              {kcalDieta<get ? `✅ Déficit de ${(get-kcalDieta).toFixed(0)} kcal/dia` : `⚠️ Superávit de ${(kcalDieta-get).toFixed(0)} kcal/dia`}
            </span>
          </div>
        )}
      </div>

      <div className="card">
        <div className="card-title">🍽️ Resumo da Dieta Montada</div>
        <div className="grid4" style={{marginBottom:16}}>
          <div className="stat gold"><div className="stat-val">{totals.kcal.toFixed(0)}</div><div className="stat-lbl">kcal total</div></div>
          <div className="stat blue"><div className="stat-val">{totals.cho.toFixed(1)}g</div><div className="stat-lbl">CHO</div></div>
          <div className="stat green"><div className="stat-val">{totals.ptn.toFixed(1)}g</div><div className="stat-lbl">PTN</div></div>
          <div className="stat" style={{background:'#FFF3E0'}}><div className="stat-val" style={{color:'#E07A20'}}>{totals.lip.toFixed(1)}g</div><div className="stat-lbl">LIP</div></div>
        </div>
        {kcalDieta > 0 && (
          <>
            <MacroBar label="Calorias" value={totals.kcal} max={kcalDieta} color="gold" unit=" kcal"/>
            <MacroBar label="CHO" value={totals.cho} max={cho_g} color="blue"/>
            <MacroBar label="PTN" value={totals.ptn} max={ptn_g} color="green"/>
            <MacroBar label="LIP" value={totals.lip} max={lip_g} color="red"/>
          </>
        )}
        {MEALS.filter(m=>(meals[m]||[]).length>0).map(meal => {
          const mt = mealTotals(meal);
          const items = meals[meal]||[];
          return (
            <div key={meal} style={{marginTop:20}}>
              <div style={{fontWeight:700,marginBottom:8,color:'var(--gold)',fontSize:14}}>{meal}</div>
              <div style={{fontSize:12,color:'var(--mid)',marginBottom:8}}>{mt.kcal.toFixed(0)} kcal · CHO: {mt.cho.toFixed(1)}g · PTN: {mt.ptn.toFixed(1)}g · LIP: {mt.lip.toFixed(1)}g</div>
              <table className="tbl">
                <thead><tr><th>Alimento</th><th>Qtd</th><th>kcal</th><th>CHO</th><th>PTN</th><th>LIP</th></tr></thead>
                <tbody>
                  {items.map((f,i)=>(
                    <tr key={i}>
                      <td>{f.nome}</td><td>{f.quantidade}g</td>
                      <td>{f.kcal.toFixed(1)}</td><td>{f.carbo.toFixed(1)}g</td>
                      <td>{f.ptn.toFixed(1)}g</td><td>{f.lip.toFixed(1)}g</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        })}
        {Object.values(meals).every(v=>v.length===0) && <div className="empty">Nenhum alimento adicionado na aba "Montar Dieta"</div>}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState(0);
  const [dados, setDados] = useState({ nome:'', sexo:'F', idade:25, peso:60, altura:165, gordura:20 });
  const [trainActs, setTrainActs] = useState([]);
  const [dailyHours, setDailyHours] = useState(DAILY_ACTS);
  const [kcalDieta, setKcalDieta] = useState(1800);
  const [ptnGKg, setPtnGKg] = useState(1.8);
  const [choPct, setChoPct] = useState(45);
  const [meals, setMeals] = useState(() => { const m={}; MEALS.forEach(n=>m[n]=[]); return m; });

  const tabs = [
    { label: '1. Paciente', icon: '👤' },
    { label: '2. Atividades', icon: '🏃' },
    { label: '3. Macros', icon: '⚗️' },
    { label: '4. Dieta', icon: '🍽️' },
    { label: '5. Relatório', icon: '📋' },
  ];

  return (
    <>
      <nav className="nav">
        <div className="nav-logo">NUTRIR</div>
        <div className="nav-tabs">
          {tabs.map((t,i) => (
            <button key={i} className={`nav-tab${tab===i?' active':''}${i<tab?' done':''}`} onClick={()=>setTab(i)}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
      </nav>
      {tab===0 && <Tab1 dados={dados} setDados={setDados} onNext={()=>setTab(1)}/>}
      {tab===1 && <Tab2 dados={dados} trainActs={trainActs} setTrainActs={setTrainActs} dailyHours={dailyHours} setDailyHours={setDailyHours} onNext={()=>setTab(2)} onPrev={()=>setTab(0)}/>}
      {tab===2 && <Tab3 dados={dados} trainActs={trainActs} dailyHours={dailyHours} kcalDieta={kcalDieta} setKcalDieta={setKcalDieta} ptnGKg={ptnGKg} setPtnGKg={setPtnGKg} choPct={choPct} setChoPct={setChoPct} onNext={()=>setTab(3)} onPrev={()=>setTab(1)}/>}
      {tab===3 && <Tab4 kcalDieta={kcalDieta} dados={dados} ptnGKg={ptnGKg} choPct={choPct} meals={meals} setMeals={setMeals}/>}
      {tab===4 && <Tab5 dados={dados} trainActs={trainActs} dailyHours={dailyHours} kcalDieta={kcalDieta} ptnGKg={ptnGKg} choPct={choPct} meals={meals}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
